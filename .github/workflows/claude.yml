name: Claude Auto PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: sk-ant-api03-dummy-example-key-not-valid
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and check for:
            - Bugs and logic errors
            - Security vulnerabilities
            - Performance issues
            - Code quality and best practices
            - Missing tests

            Post a summary using `gh pr comment` and inline comments
            on specific lines using `mcp__github_inline_comment__create_inline_comment`.
        env:
          ANTHROPIC_BASE_URL: http://localhost:4000
          ANTHROPIC_AUTH_TOKEN: sk-ant-api03-dummy-example-key-not-valid
